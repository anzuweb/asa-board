<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="じゅんびボード">
<link rel="apple-touch-icon" href="images/icon.png">
<link rel="icon" type="image/png" href="images/icon.png">
<title>あさのじゅんびボード</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  /* bodyはheight固定にしない(min-height:100%で中身の高さまで伸ばし、
     スクロールしても背景グラデが途切れないようにする) */
  html { height: 100%; }
  /* ビューポート誤認時の余白帯も背景と馴染ませる */
  html { background: #ddf1ff; }
  body {
    font-family: "Hiragino Maru Gothic ProN", "ヒラギノ丸ゴ ProN", "Rounded Mplus 1c", sans-serif;
    background: linear-gradient(160deg, #bfe6ff 0%, #ddf1ff 50%, #eef9ff 100%);
    /* 縦スクロールのみ許可(横にズレるのを防ぐ) */
    touch-action: pan-y;
    user-select: none;
    -webkit-user-select: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    min-height: 100%;
    overflow-x: hidden;
  }

  header {
    text-align: center;
    margin-bottom: 10px;
  }
  h1 {
    font-size: clamp(22px, 4vw, 44px);
    color: #ff8c42;
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  h1 svg { width: 1.3em; height: 1.3em; }
  .progress-wrap {
    width: min(820px, 94vw);
    background: #ffffffcc;
    border-radius: 999px;
    height: 26px;
    margin: 8px auto 14px;
    overflow: hidden;
    box-shadow: inset 0 2px 5px rgba(0,0,0,.08);
  }
  .progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ffd166, #ff8c42);
    border-radius: 999px;
    transition: width .5s cubic-bezier(.34,1.56,.64,1);
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }
  .progress-bar .marker {
    width: 20px;
    height: 20px;
    margin-right: 4px;
    display: none;
  }
  .progress-bar.walking .marker { display: block; }

  .board {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 14px;
    width: min(1100px, 96vw);
    flex: 1;
    align-content: stretch;
    grid-auto-rows: 1fr;
  }
  /* iPadサイズ以上: 4列固定+スクロールなしの画面ぴったりレイアウト */
  @media (min-width: 700px) {
    body { height: 100%; overflow: hidden; }
    .board {
      grid-template-columns: repeat(var(--cols, 4), 1fr);
      min-height: 0;
    }
    .task { min-height: 0; }
  }

  .task {
    background: #fff;
    border: 4px solid #ffe0b3;
    border-radius: 24px;
    /* 待機中のスタンプ(scale(3))がはみ出して横スクロールを生むのでクリップ */
    overflow: hidden;
    padding: 18px 10px 14px;
    text-align: center;
    cursor: pointer;
    box-shadow: 0 4px 0 #f0d9b8;
    transition: transform .15s, opacity .3s, border-color .3s;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    min-height: 150px;
    justify-content: center;
  }
  .task:active { transform: scale(.94); }
  .task .num {
    position: absolute;
    top: 8px;
    left: 12px;
    font-size: 15px;
    color: #c9a87a;
    font-weight: bold;
  }
  .task .icon {
    flex: 1 1 auto;
    min-height: 0;
    width: 100%;
    max-height: 240px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .task .icon img {
    max-width: min(70%, 240px);
    max-height: 100%;
    object-fit: contain;
  }
  .task .label {
    flex-shrink: 0;
    font-size: clamp(16px, 2.6vw, 28px);
    font-weight: bold;
    color: #5b4a3a;
    letter-spacing: 1px;
  }
  .task .stamp {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: scale(3) rotate(-20deg);
    pointer-events: none;
  }
  .task .stamp svg {
    width: clamp(80px, 13vw, 170px);
    height: clamp(80px, 13vw, 170px);
  }
  .task.done {
    border-color: #9be59b;
    background: #f2fff2;
    box-shadow: 0 4px 0 #c0e8c0;
  }
  .task.done .icon, .task.done .label { opacity: .35; }
  .task.done .stamp {
    opacity: 1;
    transform: scale(1) rotate(-10deg);
    transition: transform .35s cubic-bezier(.34,1.8,.64,1), opacity .2s;
  }

  /* ぜんぶできた!オーバーレイ */
  .celebrate {
    position: fixed;
    inset: 0;
    background: rgba(255, 250, 230, .96);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    text-align: center;
  }
  .celebrate.show { display: flex; }
  .celebrate .big {
    width: clamp(240px, 45vw, 440px);
    animation: bounce 1s infinite alternate;
  }
  .celebrate .big img { width: 100%; height: auto; }
  .celebrate h2 {
    font-size: clamp(30px, 6vw, 56px);
    color: #ff8c42;
    margin: 16px 0 8px;
    letter-spacing: 3px;
  }
  .celebrate p { font-size: clamp(18px, 3vw, 28px); color: #5b4a3a; }
  @keyframes bounce {
    from { transform: translateY(0) scale(1); }
    to   { transform: translateY(-24px) scale(1.08); }
  }

  .confetti {
    position: fixed;
    top: -20px;
    animation: fall linear forwards;
    z-index: 11;
    pointer-events: none;
  }
  .confetti.c-circle { width: 14px; height: 14px; border-radius: 50%; }
  .confetti.c-square { width: 12px; height: 12px; border-radius: 3px; }
  .confetti.c-ribbon { width: 8px; height: 22px; border-radius: 4px; }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); }
  }

  /* 朝/夜きりかえトグル */
  .mode-toggle {
    position: relative;
    display: inline-flex;
    gap: 4px;
    padding: 4px;
    background: #ffffffcc;
    border-radius: 999px;
    margin-bottom: 8px;
    box-shadow: inset 0 2px 5px rgba(0,0,0,.06);
  }
  .mode-btn {
    position: relative;
    z-index: 1;
    border: none;
    background: transparent;
    font-family: inherit;
    font-size: clamp(15px, 2.2vw, 20px);
    font-weight: bold;
    color: #b8a890;
    padding: 8px 22px;
    border-radius: 999px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .mode-btn .mode-ic { width: 1.2em; height: 1.2em; display: inline-flex; }
  .mode-btn .mode-ic svg { width: 100%; height: 100%; }
  .mode-btn.active { color: #fff; }
  /* スライドする選択中インジケータ(つまみ) */
  .toggle-thumb {
    position: absolute;
    top: 0;
    left: 0;
    border-radius: 999px;
    background: #ff8c42;
    box-shadow: 0 2px 6px rgba(0,0,0,.18);
    transition: transform .32s cubic-bezier(.34,1.45,.64,1), width .32s, background-color .32s;
    z-index: 0;
    pointer-events: none;
  }
  /* 選択中はアイコンも白にして背景と同化しないようにする */
  .mode-btn.active .mode-ic svg * { fill: #fff; stroke: #fff; }

  /* 夜テーマ */
  html.night { background: #232845; }
  body.night { background: linear-gradient(160deg, #2a2f55 0%, #353a63 55%, #46406b 100%); }
  body.night h1 { color: #fff; }
  body.night .task { border-color: #7a8fe0; box-shadow: 0 4px 0 #4a5699; }
  body.night .task.done { border-color: #9be59b; box-shadow: 0 4px 0 #5f8f5f; }
  body.night .version { color: #ffffff66; }
  body.night .reset-btn { background: #ffffffe6; color: #5a4f87; }
  /* 夜の選択色はJSでつまみに設定 */
  body.night .progress-bar { background: linear-gradient(90deg, #b3a4ec, #7a6ad6); }
  body.night .celebrate { background: rgba(40, 44, 80, .96); }
  body.night .celebrate h2 { color: #ffe08a; }
  body.night .celebrate p { color: #e7e3ff; }

  /* 夜のお星さま(背景・コンテンツの裏側) */
  #stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; display: none; }
  body.night #stars { display: block; }
  body header, body .board, body footer { position: relative; z-index: 1; }
  #stars .star {
    position: absolute;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 5px 1px rgba(255, 255, 255, .7);
    animation: twinkle 2.4s infinite;
  }
  #stars .moon {
    position: absolute;
    top: 6px;
    right: 16px;
    width: clamp(80px, 11vw, 130px);
  }
  #stars .moon svg { width: 100%; height: auto; }
  @keyframes twinkle {
    0%, 100% { opacity: .15; }
    50% { opacity: 1; }
  }

  /* 朝のおひさま・くも(背景・コンテンツの裏側) */
  #sky { position: fixed; inset: 0; z-index: 0; pointer-events: none; display: none; overflow: hidden; }
  body:not(.night) #sky { display: block; }
  #sky .sun {
    position: absolute;
    top: -18px;
    right: 6px;
    width: clamp(100px, 13vw, 168px);
    opacity: .9;
  }
  #sky .sun svg { width: 100%; height: auto; }
  #sky .cloud {
    position: absolute;
    left: 0;
    width: 64px;
    height: 24px;
    background: #fff;
    border-radius: 999px;
    opacity: .85;
    box-shadow: 20px 7px 0 -4px #fff, -20px 7px 0 -2px #fff;
    animation: flow linear infinite;
  }
  #sky .cloud1 { top: 4%;  animation-duration: 26s; animation-delay: 0s; }
  #sky .cloud2 { top: 11%; animation-duration: 32s; animation-delay: -8s; }
  #sky .cloud3 { top: 7%;  animation-duration: 28s; animation-delay: -16s; }
  #sky .cloud4 { top: 14%; animation-duration: 34s; animation-delay: -22s; }
  @keyframes flow {
    from { transform: translateX(-120px); }
    to { transform: translateX(calc(100vw + 120px)); }
  }

  footer {
    margin-top: 10px;
    width: min(1100px, 96vw);
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 10px;
  }
  .version {
    font-size: 11px;
    color: #c9bca8;
  }
  .reset-btn {
    border: none;
    background: #ffffff99;
    color: #b8a890;
    font-size: 13px;
    padding: 8px 14px;
    border-radius: 999px;
    cursor: pointer;
    font-family: inherit;
  }
</style>
</head>
<body>

<div id="stars"><span class="moon" id="skyMoon"></span></div>
<div id="sky">
  <span class="sun" id="skySun"></span>
  <span class="cloud cloud1"></span>
  <span class="cloud cloud2"></span>
  <span class="cloud cloud3"></span>
  <span class="cloud cloud4"></span>
</div>

<header>
  <div class="mode-toggle">
    <span class="toggle-thumb" id="toggleThumb"></span>
    <button class="mode-btn" data-mode="morning"><span class="mode-ic" id="mtSun"></span>あさ</button>
    <button class="mode-btn" data-mode="night"><span class="mode-ic" id="mtMoon"></span>よる</button>
  </div>
  <h1><span id="titleText">あさのじゅんびボード</span></h1>
  <div class="progress-wrap"><div class="progress-bar" id="bar"><span class="marker" id="barMarker"></span></div></div>
</header>

<main class="board" id="board"></main>

<footer>
  <span class="version">v3.7</span>
  <button class="reset-btn" id="resetBtn">やりなおす</button>
</footer>

<div class="celebrate" id="celebrate">
  <div class="big" id="celebrateIcon"></div>
  <h2>ぜんぶできたね!</h2>
  <p id="celebrateMsg">すごい!いってらっしゃい!</p>
</div>

<script>
// ===== 手描き風SVGアイコン =====
const ICONS = {
  // おひさま(タイトル・お祝いにも使用)
  sun: `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <g stroke="#f4a226" stroke-width="4" stroke-linecap="round">
      <line x1="32" y1="5" x2="32" y2="13"/><line x1="32" y1="51" x2="32" y2="59"/>
      <line x1="5" y1="32" x2="13" y2="32"/><line x1="51" y1="32" x2="59" y2="32"/>
      <line x1="13" y1="13" x2="18.5" y2="18.5"/><line x1="45.5" y1="45.5" x2="51" y2="51"/>
      <line x1="13" y1="51" x2="18.5" y2="45.5"/><line x1="45.5" y1="18.5" x2="51" y2="13"/>
    </g>
    <circle cx="32" cy="32" r="15" fill="#ffd166" stroke="#f4a226" stroke-width="3"/>
    <circle cx="26.5" cy="30" r="1.8" fill="#8a5a00"/><circle cx="37.5" cy="30" r="1.8" fill="#8a5a00"/>
    <path d="M26.5 35.5 q5.5 4.5 11 0" stroke="#8a5a00" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <circle cx="23" cy="34" r="2.2" fill="#ffab6b" opacity=".7"/><circle cx="41" cy="34" r="2.2" fill="#ffab6b" opacity=".7"/>
  </svg>`,

  // 赤い手描き風はなまる(スタンプ)
  stamp: `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <path d="M32 8 q20 -2 22 16 q2 16 -14 22 q-16 6 -26 -6 q-9 -11 -1 -23 q5 -8 14 -9" fill="none" stroke="#e8504a" stroke-width="6.5" stroke-linecap="round"/>
  </svg>`,

  // 進捗バーのマーカー(おほしさま)
  star: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 2 l2.7 6.3 6.8 0.6 -5.2 4.5 1.6 6.7 -5.9 -3.6 -5.9 3.6 1.6 -6.7 -5.2 -4.5 6.8 -0.6 z" fill="#fff" stroke="#f4a226" stroke-width="1.5" stroke-linejoin="round"/>
  </svg>`,

  // おつきさま(夜のタイトル・トグル用)
  moon: `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <path d="M40 7 a26 26 0 1 0 18 46 A22 22 0 0 1 40 7 z" fill="#ffe08a" stroke="#e6bf5c" stroke-width="3" stroke-linejoin="round"/>
    <path d="M50 12 l1.4 3.2 3.2 1.4 -3.2 1.4 -1.4 3.2 -1.4 -3.2 -3.2 -1.4 3.2 -1.4 z" fill="#fff3c4"/>
    <circle cx="56" cy="26" r="1.6" fill="#fff3c4"/>
  </svg>`,

};

// 朝・夜の2ボード。タスクのアイコン画像は images/<id>.png
const BOARDS = {
  morning: {
    title: 'あさのじゅんびボード',
    titleIcon: ICONS.sun,
    cheer: 'すごい!いってらっしゃい!',
    celebrateImg: 'images/celebrate.png',
    tasks: [
      { id: 'breakfast', label: 'あさごはん' },
      { id: 'teeth',     label: 'はみがき' },
      { id: 'sunscreen', label: 'ひやけどめ' },
      { id: 'clothes',   label: 'おきがえ' },
      { id: 'bugspray',  label: 'むしよけ<br>スプレー' },
      { id: 'taion',     label: 'たいおん' },
      { id: 'toilet',    label: 'トイレ' },
      { id: 'socks',     label: 'くつした' },
      { id: 'hanky',     label: 'ハンカチ' },
    ],
  },
  night: {
    title: 'よるのじゅんびボード',
    titleIcon: ICONS.moon,
    cheer: 'すごい!おやすみなさい!',
    celebrateImg: 'images/celebrate-night.png',
    tasks: [
      { id: 'dinner',       label: 'よるごはん' },
      { id: 'bath',         label: 'おふろ' },
      { id: 'teeth-night',  label: 'はみがき' },
      { id: 'floss',        label: 'いとようじ' },
      { id: 'toilet-night', label: 'トイレ' },
      { id: 'clothes-night', label: 'あしたのふく' },
    ],
  },
};
const KEY = 'asaboard-v2';

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
}

function freshState() {
  return { date: todayStr(), morning: {}, night: {} };
}

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(KEY));
    if (s && s.date === todayStr()) {
      return { date: s.date, morning: s.morning || {}, night: s.night || {} };
    }
  } catch (e) {}
  return freshState();
}

let state = loadState();
// 開いた時刻で初期表示を決める(14時以降は夜)。トグルでいつでも切替可
let mode = (new Date().getHours() >= 14) ? 'night' : 'morning';

function saveState() {
  state.date = todayStr();
  localStorage.setItem(KEY, JSON.stringify(state));
}
function curTasks() { return BOARDS[mode].tasks; }
function curDone() { return state[mode]; }

// 効果音(Web Audio・タップ時にピコン、コンプリートでファンファーレ)
// iOSは指を離した操作(touchend/click)でしか音声を解錠できないため、
// 最初のタップ完了時にAudioContextを作成・resumeしておく
let audioCtx = null;
function unlockAudio() {
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  } catch (e) {}
}
['touchend', 'pointerup', 'click'].forEach(ev =>
  document.addEventListener(ev, unlockAudio, { capture: true, passive: true }));

function beep(freqs, dur = 0.12, gap = 0.1) {
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') {
      audioCtx.resume().then(() => play());
    } else {
      play();
    }
  } catch (e) {}

  function play() {
    freqs.forEach((f, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.value = f;
      g.gain.setValueAtTime(0.25, audioCtx.currentTime + i * gap);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * gap + dur);
      o.connect(g).connect(audioCtx.destination);
      o.start(audioCtx.currentTime + i * gap);
      o.stop(audioCtx.currentTime + i * gap + dur);
    });
  }
}

const board = document.getElementById('board');
const bar = document.getElementById('bar');
const celebrate = document.getElementById('celebrate');
const titleTextEl = document.getElementById('titleText');
const thumb = document.getElementById('toggleThumb');

document.getElementById('barMarker').innerHTML = ICONS.star;
document.getElementById('mtSun').innerHTML = ICONS.sun;
document.getElementById('skySun').innerHTML = ICONS.sun;
document.getElementById('skyMoon').innerHTML = ICONS.moon;

// 夜の背景の星(位置は固定。各要素 [left(vw), top(vh), size(px), 点滅秒, 開始遅延秒])
const STAR_LAYOUT = [
  [5, 6, 3, 2.4, 0], [12, 18, 2.5, 2.8, 0.6], [19, 9, 3.5, 2, 1.2], [27, 22, 2, 2.6, 0.3],
  [34, 5, 3, 2.2, 1.5], [41, 28, 2.5, 3, 0.9], [48, 12, 4, 1.9, 0.4], [55, 24, 2, 2.7, 1.1],
  [62, 7, 3, 2.3, 0.2], [69, 19, 2.5, 2.9, 1.7], [76, 30, 3.5, 2.1, 0.7], [83, 11, 2, 2.5, 1.3],
  [90, 25, 3, 2, 0.5], [96, 15, 2.5, 2.8, 1], [8, 32, 2, 2.4, 1.8], [44, 3, 3, 2.6, 0.8],
  [3, 48, 2.5, 2.7, 0.3], [15, 62, 3, 2.2, 1.4], [24, 80, 2, 2.9, 0.6], [37, 55, 3.5, 2, 1],
  [7, 88, 2.5, 2.5, 1.6], [52, 72, 2, 2.8, 0.4], [60, 90, 3, 2.3, 1.2], [71, 60, 2.5, 2.6, 0.9],
  [83, 78, 2, 3, 0.2], [92, 55, 3.5, 2.1, 1.5], [97, 84, 2.5, 2.4, 0.7], [46, 92, 2, 2.7, 1.1],
  [30, 68, 3, 2.2, 1.8], [88, 40, 2.5, 2.9, 0.5],
];
const starsEl = document.getElementById('stars');
STAR_LAYOUT.forEach(([l, t, sz, dur, dl]) => {
  const s = document.createElement('span');
  s.className = 'star';
  s.style.width = s.style.height = sz + 'px';
  s.style.left = l + 'vw';
  s.style.top = t + 'vh';
  s.style.animationDuration = dur + 's';
  s.style.animationDelay = dl + 's';
  starsEl.appendChild(s);
});
document.getElementById('mtMoon').innerHTML = ICONS.moon;

function applyMode() {
  const b = BOARDS[mode];
  titleTextEl.textContent = b.title;
  document.body.classList.toggle('night', mode === 'night');
  document.documentElement.classList.toggle('night', mode === 'night');
  board.style.setProperty('--cols', colsFor(b.tasks.length));
  document.querySelectorAll('.mode-btn').forEach(btn =>
    btn.classList.toggle('active', btn.dataset.mode === mode));
  placeThumb();
}

// 1段が最大5枚になるように、段数が最小＆バランスの良い列数を選ぶ
// (例: 9個→5列[5+4]、8個→4列[4+4]、5個→5列[1段])
function colsFor(n) {
  for (let rows = 1; rows <= n; rows++) {
    const c = Math.ceil(n / rows);
    if (c <= 5) return c;
  }
  return 5;
}

// 選択中のつまみを、選択ボタンの位置・大きさに合わせて配置(切替時はスライド)
let firstThumb = true;
function placeThumb() {
  const b = document.querySelector('.mode-btn.active');
  if (!b) return;
  if (firstThumb) thumb.style.transition = 'none';
  thumb.style.width = b.offsetWidth + 'px';
  thumb.style.height = b.offsetHeight + 'px';
  thumb.style.transform = `translate(${b.offsetLeft}px, ${b.offsetTop}px)`;
  thumb.style.background = mode === 'night' ? '#7a6ad6' : '#ff8c42';
  if (firstThumb) { void thumb.offsetWidth; thumb.style.transition = ''; firstThumb = false; }
}
window.addEventListener('resize', placeThumb);

function render() {
  const done = curDone();
  board.innerHTML = '';
  curTasks().forEach((t, i) => {
    const div = document.createElement('div');
    div.className = 'task' + (done[t.id] ? ' done' : '');
    div.innerHTML = `
      <span class="num">${i + 1}</span>
      <span class="icon"><img src="images/${t.id}.png" alt=""></span>
      <span class="label">${t.label}</span>
      <span class="stamp">${ICONS.stamp}</span>`;
    // スクロール中の誤タップを防ぐため click を使う(指が動いたら発火しない)
    div.addEventListener('click', () => toggle(t.id));
    board.appendChild(div);
  });
  updateProgress();
}

function toggle(id) {
  const done = curDone();
  const wasDone = !!done[id];
  done[id] = !wasDone;
  if (!done[id]) delete done[id];
  saveState();
  render();
  if (!wasDone) {
    beep([880, 1320]);
    if (allDone()) setTimeout(showCelebrate, 350);
  }
}

function allDone() {
  const done = curDone();
  return curTasks().every(t => done[t.id]);
}

function updateProgress() {
  const done = curDone();
  const ts = curTasks();
  const n = ts.filter(t => done[t.id]).length;
  bar.style.width = (n / ts.length * 100) + '%';
  bar.classList.toggle('walking', n > 0);
}

function showCelebrate() {
  document.getElementById('celebrateIcon').innerHTML = '<img src="' + BOARDS[mode].celebrateImg + '" alt="">';
  document.getElementById('celebrateMsg').textContent = BOARDS[mode].cheer;
  celebrate.classList.add('show');
  beep([523, 659, 784, 1047], 0.25, 0.15);
  const colors = ['#ff8c42', '#ffd166', '#e88aa5', '#7fd1e8', '#a5e09a', '#b89ae0'];
  const shapes = ['c-circle', 'c-square', 'c-ribbon'];
  for (let i = 0; i < 40; i++) {
    const c = document.createElement('div');
    c.className = 'confetti ' + shapes[i % shapes.length];
    c.style.background = colors[i % colors.length];
    c.style.left = Math.random() * 100 + 'vw';
    c.style.animationDuration = (2 + Math.random() * 2) + 's';
    c.style.animationDelay = Math.random() * 1.5 + 's';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
  }
}

function setMode(m) {
  if (m === mode) return;
  mode = m;
  applyMode();
  render();
}
document.querySelectorAll('.mode-btn').forEach(btn =>
  btn.addEventListener('click', () => setMode(btn.dataset.mode)));

celebrate.addEventListener('click', () => celebrate.classList.remove('show'));

document.getElementById('resetBtn').addEventListener('click', () => {
  if (confirm('このボードのチェックをぜんぶリセットする?')) {
    state[mode] = {};
    saveState();
    render();
  }
});

// 日付が変わったら自動リセット(画面を開きっぱなしでも復帰時にチェック)
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && state.date !== todayStr()) {
    state = freshState();
    saveState();
    render();
  }
});

applyMode();

render();

// オフライン用Service Worker(ネット不安定時もイラストが消えないように)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
