<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="じゅんびボード">
<link rel="apple-touch-icon" href="images/icon.png">
<link rel="icon" type="image/png" href="images/icon.png">
<title>あさのじゅんびボード</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: "Hiragino Maru Gothic ProN", "ヒラギノ丸ゴ ProN", "Rounded Mplus 1c", sans-serif;
    background: linear-gradient(160deg, #fff9e6 0%, #ffeef5 50%, #e8f7ff 100%);
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    min-height: 100%;
    overflow-x: hidden;
  }

  header {
    text-align: center;
    margin-bottom: 10px;
  }
  h1 {
    font-size: clamp(22px, 4vw, 34px);
    color: #ff8c42;
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  h1 svg { width: 1.3em; height: 1.3em; }
  .progress-wrap {
    width: min(680px, 94vw);
    background: #ffffffcc;
    border-radius: 999px;
    height: 26px;
    margin: 8px auto 14px;
    overflow: hidden;
    box-shadow: inset 0 2px 5px rgba(0,0,0,.08);
  }
  .progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ffd166, #ff8c42);
    border-radius: 999px;
    transition: width .5s cubic-bezier(.34,1.56,.64,1);
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }
  .progress-bar .marker {
    width: 20px;
    height: 20px;
    margin-right: 4px;
    display: none;
  }
  .progress-bar.walking .marker { display: block; }

  .board {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 14px;
    width: min(900px, 96vw);
    flex: 1;
    align-content: stretch;
    grid-auto-rows: 1fr;
  }

  .task {
    background: #fff;
    border: 4px solid #ffe0b3;
    border-radius: 24px;
    padding: 18px 10px 14px;
    text-align: center;
    cursor: pointer;
    box-shadow: 0 4px 0 #f0d9b8;
    transition: transform .15s, opacity .3s, border-color .3s;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    min-height: 150px;
    justify-content: center;
  }
  .task:active { transform: scale(.94); }
  .task .num {
    position: absolute;
    top: 8px;
    left: 12px;
    font-size: 15px;
    color: #c9a87a;
    font-weight: bold;
  }
  .task .icon {
    width: clamp(60px, 9vw, 96px);
    height: clamp(60px, 9vw, 96px);
  }
  .task .icon img { width: 100%; height: 100%; object-fit: contain; }
  .task .label {
    font-size: clamp(16px, 2.6vw, 22px);
    font-weight: bold;
    color: #5b4a3a;
    letter-spacing: 1px;
  }
  .task .stamp {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: scale(3) rotate(-20deg);
    pointer-events: none;
  }
  .task .stamp svg {
    width: clamp(80px, 12vw, 120px);
    height: clamp(80px, 12vw, 120px);
  }
  .task.done {
    border-color: #9be59b;
    background: #f2fff2;
    box-shadow: 0 4px 0 #c0e8c0;
  }
  .task.done .icon, .task.done .label { opacity: .35; }
  .task.done .stamp {
    opacity: 1;
    transform: scale(1) rotate(-10deg);
    transition: transform .35s cubic-bezier(.34,1.8,.64,1), opacity .2s;
  }

  /* ぜんぶできた!オーバーレイ */
  .celebrate {
    position: fixed;
    inset: 0;
    background: rgba(255, 250, 230, .96);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    text-align: center;
  }
  .celebrate.show { display: flex; }
  .celebrate .big {
    width: clamp(240px, 45vw, 440px);
    animation: bounce 1s infinite alternate;
  }
  .celebrate .big img { width: 100%; height: auto; }
  .celebrate h2 {
    font-size: clamp(30px, 6vw, 56px);
    color: #ff8c42;
    margin: 16px 0 8px;
    letter-spacing: 3px;
  }
  .celebrate p { font-size: clamp(18px, 3vw, 28px); color: #5b4a3a; }
  @keyframes bounce {
    from { transform: translateY(0) scale(1); }
    to   { transform: translateY(-24px) scale(1.08); }
  }

  .confetti {
    position: fixed;
    top: -20px;
    animation: fall linear forwards;
    z-index: 11;
    pointer-events: none;
  }
  .confetti.c-circle { width: 14px; height: 14px; border-radius: 50%; }
  .confetti.c-square { width: 12px; height: 12px; border-radius: 3px; }
  .confetti.c-ribbon { width: 8px; height: 22px; border-radius: 4px; }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); }
  }

  footer {
    margin-top: 10px;
    width: min(900px, 96vw);
    display: flex;
    justify-content: flex-end;
  }
  .reset-btn {
    border: none;
    background: #ffffff99;
    color: #b8a890;
    font-size: 13px;
    padding: 8px 14px;
    border-radius: 999px;
    cursor: pointer;
    font-family: inherit;
  }
</style>
</head>
<body>

<header>
  <h1><span id="titleSun"></span>あさのじゅんびボード</h1>
  <div class="progress-wrap"><div class="progress-bar" id="bar"><span class="marker" id="barMarker"></span></div></div>
</header>

<main class="board" id="board"></main>

<footer>
  <button class="reset-btn" id="resetBtn">やりなおす</button>
</footer>

<div class="celebrate" id="celebrate">
  <div class="big" id="celebrateIcon"></div>
  <h2>ぜんぶできたね!</h2>
  <p>すごい!いってらっしゃい!</p>
</div>

<script>
// ===== 手描き風SVGアイコン =====
const ICONS = {
  // おひさま(タイトル・お祝いにも使用)
  sun: `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <g stroke="#f4a226" stroke-width="4" stroke-linecap="round">
      <line x1="32" y1="5" x2="32" y2="13"/><line x1="32" y1="51" x2="32" y2="59"/>
      <line x1="5" y1="32" x2="13" y2="32"/><line x1="51" y1="32" x2="59" y2="32"/>
      <line x1="13" y1="13" x2="18.5" y2="18.5"/><line x1="45.5" y1="45.5" x2="51" y2="51"/>
      <line x1="13" y1="51" x2="18.5" y2="45.5"/><line x1="45.5" y1="18.5" x2="51" y2="13"/>
    </g>
    <circle cx="32" cy="32" r="15" fill="#ffd166" stroke="#f4a226" stroke-width="3"/>
    <circle cx="26.5" cy="30" r="1.8" fill="#8a5a00"/><circle cx="37.5" cy="30" r="1.8" fill="#8a5a00"/>
    <path d="M26.5 35.5 q5.5 4.5 11 0" stroke="#8a5a00" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <circle cx="23" cy="34" r="2.2" fill="#ffab6b" opacity=".7"/><circle cx="41" cy="34" r="2.2" fill="#ffab6b" opacity=".7"/>
  </svg>`,

  // 赤い手描き風はなまる(スタンプ)
  stamp: `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <path d="M32 8 q20 -2 22 16 q2 16 -14 22 q-16 6 -26 -6 q-9 -11 -1 -23 q5 -8 14 -9" fill="none" stroke="#e8504a" stroke-width="6.5" stroke-linecap="round"/>
  </svg>`,

  // 進捗バーのマーカー(おほしさま)
  star: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 2 l2.7 6.3 6.8 0.6 -5.2 4.5 1.6 6.7 -5.9 -3.6 -5.9 3.6 1.6 -6.7 -5.2 -4.5 6.8 -0.6 z" fill="#fff" stroke="#f4a226" stroke-width="1.5" stroke-linejoin="round"/>
  </svg>`,

};

const TASKS = [
  { id: 'breakfast', label: 'あさごはん' },
  { id: 'teeth',     label: 'はみがき' },
  { id: 'sunscreen', label: 'ひやけどめ' },
  { id: 'clothes',   label: 'おきがえ' },
  { id: 'bugspray',  label: 'むしよけ<br>スプレー' },
  { id: 'toilet',    label: 'トイレ' },
  { id: 'socks',     label: 'くつした' },
];
// タスクのアイコン画像は images/<id>.png
const KEY = 'asaboard-v1';

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
}

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(KEY));
    if (s && s.date === todayStr()) return s;
  } catch (e) {}
  return { date: todayStr(), done: {} };
}

let state = loadState();

function saveState() {
  state.date = todayStr();
  localStorage.setItem(KEY, JSON.stringify(state));
}

// 効果音(Web Audio・タップ時にピコン、コンプリートでファンファーレ)
// iOSは指を離した操作(touchend/click)でしか音声を解錠できないため、
// 最初のタップ完了時にAudioContextを作成・resumeしておく
let audioCtx = null;
function unlockAudio() {
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  } catch (e) {}
}
['touchend', 'pointerup', 'click'].forEach(ev =>
  document.addEventListener(ev, unlockAudio, { capture: true, passive: true }));

function beep(freqs, dur = 0.12, gap = 0.1) {
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') {
      audioCtx.resume().then(() => play());
    } else {
      play();
    }
  } catch (e) {}

  function play() {
    freqs.forEach((f, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.value = f;
      g.gain.setValueAtTime(0.25, audioCtx.currentTime + i * gap);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * gap + dur);
      o.connect(g).connect(audioCtx.destination);
      o.start(audioCtx.currentTime + i * gap);
      o.stop(audioCtx.currentTime + i * gap + dur);
    });
  }
}

const board = document.getElementById('board');
const bar = document.getElementById('bar');
const celebrate = document.getElementById('celebrate');

document.getElementById('titleSun').innerHTML = ICONS.sun;
document.getElementById('barMarker').innerHTML = ICONS.star;
document.getElementById('celebrateIcon').innerHTML = '<img src="images/celebrate.png" alt="">';

function render() {
  board.innerHTML = '';
  TASKS.forEach((t, i) => {
    const div = document.createElement('div');
    div.className = 'task' + (state.done[t.id] ? ' done' : '');
    div.innerHTML = `
      <span class="num">${i + 1}</span>
      <span class="icon"><img src="images/${t.id}.png" alt=""></span>
      <span class="label">${t.label}</span>
      <span class="stamp">${ICONS.stamp}</span>`;
    div.addEventListener('pointerdown', () => toggle(t.id));
    board.appendChild(div);
  });
  updateProgress();
}

function toggle(id) {
  const wasDone = !!state.done[id];
  state.done[id] = !wasDone;
  if (!state.done[id]) delete state.done[id];
  saveState();
  render();
  if (!wasDone) {
    beep([880, 1320]);
    if (allDone()) setTimeout(showCelebrate, 350);
  }
}

function allDone() {
  return TASKS.every(t => state.done[t.id]);
}

function updateProgress() {
  const n = TASKS.filter(t => state.done[t.id]).length;
  bar.style.width = (n / TASKS.length * 100) + '%';
  bar.classList.toggle('walking', n > 0);
}

function showCelebrate() {
  celebrate.classList.add('show');
  beep([523, 659, 784, 1047], 0.25, 0.15);
  const colors = ['#ff8c42', '#ffd166', '#e88aa5', '#7fd1e8', '#a5e09a', '#b89ae0'];
  const shapes = ['c-circle', 'c-square', 'c-ribbon'];
  for (let i = 0; i < 40; i++) {
    const c = document.createElement('div');
    c.className = 'confetti ' + shapes[i % shapes.length];
    c.style.background = colors[i % colors.length];
    c.style.left = Math.random() * 100 + 'vw';
    c.style.animationDuration = (2 + Math.random() * 2) + 's';
    c.style.animationDelay = Math.random() * 1.5 + 's';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
  }
}

celebrate.addEventListener('pointerdown', () => celebrate.classList.remove('show'));

document.getElementById('resetBtn').addEventListener('click', () => {
  if (confirm('チェックをぜんぶリセットする?')) {
    state = { date: todayStr(), done: {} };
    saveState();
    render();
  }
});

// 日付が変わったら自動リセット(画面を開きっぱなしでも復帰時にチェック)
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && state.date !== todayStr()) {
    state = { date: todayStr(), done: {} };
    saveState();
    render();
  }
});

render();
</script>
</body>
</html>
